<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">YPS Bahamas community visual placeholder</title>
  <desc id="desc">A navy and gold editorial placeholder for YPS Bahamas networking, leadership, and community event photography.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#111f3b"/>
      <stop offset="1" stop-color="#0b1328"/>
    </linearGradient>
    <linearGradient id="card" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.05"/>
    </linearGradient>
    <pattern id="dots" width="34" height="34" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="1.5" fill="#ffffff" fill-opacity="0.12"/>
    </pattern>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)"/>
  <rect width="1200" height="900" fill="url(#dots)"/>
  <circle cx="1020" cy="90" r="310" fill="#d9a72f" fill-opacity="0.2"/>
  <circle cx="70" cy="840" r="280" fill="#d9a72f" fill-opacity="0.12"/>
  <g transform="translate(90 110)">
    <rect width="1020" height="680" rx="54" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.18"/>
    <rect x="60" y="58" width="420" height="500" rx="36" fill="#ffffff" fill-opacity="0.1"/>
    <rect x="520" y="118" width="220" height="180" rx="32" fill="#d9a72f" fill-opacity="0.75"/>
    <rect x="770" y="118" width="190" height="180" rx="32" fill="#ffffff" fill-opacity="0.12"/>
    <rect x="520" y="330" width="440" height="170" rx="32" fill="#ffffff" fill-opacity="0.1"/>
    <circle cx="190" cy="230" r="76" fill="#d9a72f" fill-opacity="0.9"/>
    <circle cx="340" cy="250" r="72" fill="#ffffff" fill-opacity="0.82"/>
    <circle cx="264" cy="380" r="92" fill="#ffffff" fill-opacity="0.18"/>
    <path d="M114 478c55-78 119-116 192-116 75 0 135 39 180 116" fill="none" stroke="#ffffff" stroke-opacity="0.45" stroke-width="30" stroke-linecap="round"/>
    <text x="60" y="625" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="54" font-weight="800" letter-spacing="-1.5">YPS Bahamas</text>
    <text x="524" y="610" fill="#ffffff" fill-opacity="0.72" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="500">Replace with approved YPS event, networking, or leadership photography.</text>
  </g>
</svg>
